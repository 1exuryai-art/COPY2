<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>MROZOWSKI AUTOMATION — System zgłoszeń</title>
  <meta
    name="description"
    content="MROZOWSKI Automation — premium strona, ścieżka zapisu i system zgłoszeń dla lokalnych biznesów."
  />

  <link rel="stylesheet" href="./style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Sora:wght@500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --landing-max: 1240px;

      --bg-0: #050713;
      --bg-1: #080b1f;
      --bg-2: #0d1230;
      --bg-3: #12183a;
      --bg-4: #171f4a;

      --surface: rgba(255, 255, 255, 0.055);
      --surface-soft: rgba(255, 255, 255, 0.035);
      --surface-strong: rgba(255, 255, 255, 0.085);
      --surface-card: rgba(255, 255, 255, 0.062);
      --surface-deep: rgba(5, 8, 22, 0.72);

      --text: #f4f7ff;
      --text-strong: #ffffff;
      --text-soft: #dbe4ff;
      --muted: #a8b3cf;
      --soft: #6f7da4;

      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --accent-3: #38bdf8;
      --accent-4: #c084fc;
      --accent-deep: #4f46e5;

      --accent-soft: rgba(99, 102, 241, 0.13);
      --accent-faint: rgba(99, 102, 241, 0.075);
      --accent-line: rgba(139, 92, 246, 0.24);
      --accent-line-strong: rgba(139, 92, 246, 0.38);

      --cyan-soft: rgba(56, 189, 248, 0.10);
      --cyan-line: rgba(56, 189, 248, 0.16);

      --green: #4ade80;
      --green-soft: rgba(74, 222, 128, 0.10);
      --green-line: rgba(74, 222, 128, 0.18);

      --line: rgba(255, 255, 255, 0.09);
      --line-soft: rgba(255, 255, 255, 0.06);
      --line-strong: rgba(255, 255, 255, 0.14);

      --shadow-xs: 0 8px 18px rgba(0, 0, 0, 0.22);
      --shadow-sm: 0 14px 30px rgba(0, 0, 0, 0.28);
      --shadow-md: 0 22px 52px rgba(0, 0, 0, 0.34);
      --shadow-lg: 0 34px 90px rgba(0, 0, 0, 0.44);
      --shadow-xl: 0 44px 120px rgba(0, 0, 0, 0.54);
      --shadow-violet: 0 22px 58px rgba(99, 102, 241, 0.28);

      --glass: blur(24px) saturate(145%);
      --glass-light: blur(16px) saturate(132%);
      --glass-highlight: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      --glass-highlight-strong: inset 0 1px 0 rgba(255, 255, 255, 0.12);

      --radius-xxl: 42px;
      --radius-xl: 34px;
      --radius-lg: 28px;
      --radius-md: 22px;
      --radius-sm: 16px;
      --radius-xs: 12px;

      --header-h: 92px;
      --mobile-top-h: 76px;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --ease: cubic-bezier(.2, .8, .2, 1);
      --ease-spring: cubic-bezier(.18, .95, .22, 1);
      --transition: 260ms var(--ease);
      --transition-slow: 460ms var(--ease-spring);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    html {
      scroll-behavior: smooth;
      background: var(--bg-0);
      overflow-x: hidden;
    }

    body {
      min-height: 100%;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(99,102,241,.22), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(56,189,248,.13), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(192,132,252,.10), transparent 34%),
        linear-gradient(180deg, #050713 0%, #080b1f 42%, #0d1230 100%);
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body.booking-open,
    body.faq-open {
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.026) 1px, transparent 1px),
        radial-gradient(circle at center, rgba(255,255,255,.035), transparent 58%);
      background-size: 34px 34px, 34px 34px, auto;
      mask-image: radial-gradient(circle at 50% 18%, black 16%, transparent 84%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0%, rgba(99,102,241,.035) 28%, transparent 46%),
        radial-gradient(circle at center, rgba(255,255,255,.028), transparent 70%);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1,
    h2,
    h3 {
      font-family: "Sora", sans-serif;
      color: var(--text-strong);
    }

    img {
      display: block;
      max-width: 100%;
    }

    a,
    button {
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    ::selection {
      color: #ffffff;
      background: rgba(139, 92, 246, 0.28);
    }

    .desktop-version,
    .mobile-version,
    .booking-overlay {
      position: relative;
      z-index: 2;
    }

    .desktop-version {
      display: block;
    }

    .mobile-version {
      display: none;
    }

    .landing-container {
      width: min(var(--landing-max), calc(100% - 28px));
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .landing-bg-orb,
    .landing-noise,
    .screen-flash {
      pointer-events: none;
    }

    .landing-bg-orb {
      position: fixed;
      z-index: 1;
      border-radius: 999px;
      filter: blur(100px);
      opacity: .94;
      transform: translate3d(0,0,0);
      animation: orbMove 13s ease-in-out infinite alternate;
    }

    .landing-bg-orb.one {
      width: 470px;
      height: 470px;
      left: -170px;
      top: -130px;
      background: rgba(99,102,241,.22);
    }

    .landing-bg-orb.two {
      width: 540px;
      height: 540px;
      right: -240px;
      top: 210px;
      background: rgba(56,189,248,.12);
      animation-delay: -3.2s;
    }

    .landing-bg-orb.three {
      width: 520px;
      height: 520px;
      left: 22%;
      bottom: -280px;
      background: rgba(192,132,252,.12);
      animation-delay: -6.4s;
    }

    .landing-noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: .34;
      background-image:
        radial-gradient(circle at 25% 25%, rgba(255,255,255,.11) 0 1px, transparent 1px),
        radial-gradient(circle at 75% 75%, rgba(56,189,248,.12) 0 1px, transparent 1px);
      background-size: 34px 34px, 48px 48px;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
    }

    .screen-flash {
      position: fixed;
      inset: 0;
      z-index: 320;
      opacity: 0;
      background:
        radial-gradient(circle at center, rgba(139,92,246,.16), transparent 36%),
        linear-gradient(180deg, rgba(56,189,248,.08), transparent 45%);
      transition: opacity 160ms ease;
    }

    .screen-flash.active {
      opacity: 1;
    }

    .portfolio-back {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 9999;
      min-height: 42px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(5,8,22,.72);
      backdrop-filter: var(--glass-light);
      -webkit-backdrop-filter: var(--glass-light);
      box-shadow: var(--shadow-xs), var(--glass-highlight);
      color: #c4b5fd;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .brand-wordmark,
    .mobile-wordmark,
    .booking-wordmark,
    .mini-wordmark,
    .logo-box-wordmark,
    .map-wordmark {
      display: grid;
      justify-items: center;
      gap: 2px;
      text-align: center;
      line-height: .88;
      color: #fff;
      font-family: "Sora", sans-serif;
      font-weight: 900;
      letter-spacing: -.055em;
      text-transform: uppercase;
      filter: drop-shadow(0 0 18px rgba(99,102,241,.20));
    }

    .brand-wordmark span:first-child {
      font-size: 21px;
      letter-spacing: -.075em;
    }

    .brand-wordmark span:last-child {
      color: #93c5fd;
      font-size: 10px;
      letter-spacing: .22em;
    }

    .mobile-wordmark span:first-child {
      font-size: 20px;
      letter-spacing: -.075em;
    }

    .mobile-wordmark span:last-child {
      color: #93c5fd;
      font-size: 9px;
      letter-spacing: .20em;
    }

    .mini-wordmark span:first-child,
    .booking-wordmark span:first-child,
    .logo-box-wordmark span:first-child {
      font-size: 15px;
      letter-spacing: -.07em;
    }

    .mini-wordmark span:last-child,
    .booking-wordmark span:last-child,
    .logo-box-wordmark span:last-child {
      color: #93c5fd;
      font-size: 7px;
      letter-spacing: .13em;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 180;
      transform: translateY(0);
      opacity: 1;
      background: linear-gradient(180deg, rgba(5,8,22,.94), rgba(5,8,22,.78));
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border-bottom: 1px solid rgba(255,255,255,.075);
      box-shadow: 0 18px 36px rgba(0,0,0,.34);
      transition:
        transform 360ms var(--ease-spring),
        opacity 240ms ease,
        box-shadow 260ms ease,
        background 260ms ease;
      will-change: transform;
    }

    .site-header.header-hidden {
      transform: translateY(-112%);
      opacity: 0;
      pointer-events: none;
    }

    .desktop-header {
      min-height: var(--header-h);
      display: grid;
      grid-template-columns: 1fr auto 1.45fr;
      align-items: center;
      gap: 18px;
    }

    .desktop-left,
    .desktop-right {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .desktop-right {
      justify-content: flex-end;
    }

    .desktop-center {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: nowrap;
      white-space: nowrap;
    }

    .desktop-nav a {
      position: relative;
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      color: rgba(244,247,255,.78);
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: -0.01em;
      transition: color 180ms ease;
    }

    .desktop-nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 3px;
      width: 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-3), var(--accent-2));
      transition: width 220ms ease;
    }

    .desktop-nav a:hover {
      color: #fff;
    }

    .desktop-nav a:hover::after {
      width: 100%;
    }

    .desktop-logo {
      width: 170px;
      min-height: 62px;
      padding: 9px 14px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.09);
      background:
        radial-gradient(circle at top, rgba(139,92,246,.16), transparent 44%),
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      box-shadow:
        0 16px 34px rgba(0,0,0,.28),
        var(--glass-highlight);
      text-decoration: none;
      position: relative;
      overflow: hidden;
      animation: logoBreath 5.6s ease-in-out infinite;
    }

    .desktop-logo::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.14), transparent 62%);
      transform: translateX(-60%) rotate(8deg);
      animation: logoShine 5.8s ease-in-out infinite;
    }

    .desktop-call-btn {
      min-height: 46px;
      padding: 0 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      box-shadow: var(--shadow-xs), var(--glass-highlight);
      color: #b7c2ff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 1000;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition:
        transform 180ms ease,
        box-shadow 180ms ease,
        border-color 180ms ease,
        background 180ms ease;
      flex-shrink: 0;
    }

    .desktop-call-btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent-line);
      background: rgba(255,255,255,.065);
      box-shadow:
        var(--shadow-sm),
        0 0 0 5px rgba(99,102,241,.06),
        var(--glass-highlight);
    }

    .lang-switcher {
      position: relative;
      z-index: 5;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 5px;
      margin-left: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.045);
      box-shadow: var(--shadow-xs), var(--glass-highlight);
      backdrop-filter: var(--glass-light);
      -webkit-backdrop-filter: var(--glass-light);
    }

    .lang-btn {
      min-width: 36px;
      height: 34px;
      padding: 0 9px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 1000;
      letter-spacing: .04em;
      transition:
        transform 160ms ease,
        color 160ms ease,
        background 160ms ease,
        box-shadow 160ms ease;
    }

    .lang-btn:active {
      transform: scale(.94);
    }

    .lang-btn.active {
      color: #fff;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.18), transparent 42%),
        linear-gradient(180deg, #8b5cf6, #6366f1 58%, #4f46e5);
      box-shadow: 0 10px 22px rgba(99,102,241,.22);
    }

    .landing-wrap {
      display: grid;
      gap: 20px;
      padding: 20px 0 54px;
      position: relative;
      z-index: 2;
      overflow: visible;
    }

    #hero,
    #experience,
    #manifest,
    #pricing,
    #product,
    #effect,
    #proof,
    #process,
    #faq,
    #contact {
      scroll-margin-top: 126px;
    }

    .hero-card,
    .section-card {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      border-radius: var(--radius-xxl);
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 12% 0%, rgba(99,102,241,.16), transparent 30%),
        radial-gradient(circle at 100% 10%, rgba(56,189,248,.075), transparent 24%),
        radial-gradient(circle at 80% 100%, rgba(192,132,252,.08), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,.058), rgba(255,255,255,.024));
      box-shadow:
        var(--shadow-xl),
        var(--glass-highlight),
        inset 0 -1px 0 rgba(255,255,255,.025);
    }

    .hero-card::before,
    .section-card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,.065), transparent 42%),
        radial-gradient(circle at 50% 0%, rgba(139,92,246,.12), transparent 46%);
    }

    .hero-card::after,
    .section-card::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: 0;
      pointer-events: none;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,.055);
    }

    .glass-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,.085);
      background:
        radial-gradient(circle at 0% 0%, rgba(99,102,241,.10), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.058), rgba(255,255,255,.024));
      box-shadow:
        var(--shadow-md),
        var(--glass-highlight);
      backdrop-filter: var(--glass-light);
      -webkit-backdrop-filter: var(--glass-light);
      min-width: 0;
    }

    .glass-card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,.06), transparent 45%);
    }

    .section-wrap {
      position: relative;
      z-index: 1;
      padding: 28px;
      min-width: 0;
    }

    .section-head {
      position: relative;
      z-index: 1;
      max-width: 880px;
      display: grid;
      gap: 11px;
      margin-bottom: 20px;
      min-width: 0;
    }

    .section-head.center {
      margin-left: auto;
      margin-right: auto;
      justify-items: center;
      text-align: center;
    }

    .section-head h2 {
      max-width: 13.5ch;
      font-size: clamp(34px, 5vw, 68px);
      line-height: .965;
      letter-spacing: -.067em;
      text-wrap: balance;
      overflow-wrap: anywhere;
    }

    .section-head.center h2 {
      max-width: 16ch;
    }

    .section-head h2 span {
      color: #c4b5fd;
      text-shadow: 0 18px 50px rgba(139,92,246,.20);
    }

    .section-head p {
      max-width: 790px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.74;
      letter-spacing: -0.01em;
    }

    .section-chip {
      width: fit-content;
      min-height: 42px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      border: 1px solid var(--accent-line);
      background: rgba(255,255,255,.05);
      box-shadow: var(--shadow-xs), var(--glass-highlight);
      color: #c4b5fd;
      font-size: 11px;
      font-weight: 1000;
      letter-spacing: .15em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      white-space: nowrap;
    }

    .section-chip::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--accent-3);
      box-shadow: 0 0 16px rgba(56,189,248,.42);
      flex: 0 0 auto;
    }

    .btn {
      min-height: 56px;
      padding: 0 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background:
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.035));
      box-shadow: var(--shadow-xs), var(--glass-highlight);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 1000;
      letter-spacing: .055em;
      text-transform: uppercase;
      transition:
        transform 190ms ease,
        box-shadow 190ms ease,
        border-color 190ms ease,
        filter 190ms ease,
        background 190ms ease;
      position: relative;
      z-index: 2;
      touch-action: manipulation;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent-line-strong);
      background: rgba(255,255,255,.065);
      box-shadow:
        var(--shadow-sm),
        0 0 0 5px rgba(99,102,241,.06),
        var(--glass-highlight);
    }

    .btn:active,
    .nav-chip:active,
    .mobile-card-btn:active,
    .cta-btn:active,
    .ghost-btn:active,
    .icon-btn:active {
      transform: scale(.96);
    }

    .btn-primary {
      color: #fff;
      border-color: rgba(139,92,246,.34);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.18), transparent 42%),
        linear-gradient(180deg, #8b5cf6 0%, #6366f1 58%, #4f46e5 100%);
      box-shadow:
        var(--shadow-violet),
        0 0 34px rgba(56,189,248,.12),
        inset 0 1px 0 rgba(255,255,255,.26);
    }

    .btn-primary:hover {
      filter: brightness(1.04) saturate(1.05);
      box-shadow:
        0 24px 54px rgba(99,102,241,.34),
        0 0 0 5px rgba(56,189,248,.08),
        inset 0 1px 0 rgba(255,255,255,.28);
    }

    .btn-ghost {
      color: #c4b5fd;
    }

    .section-actions,
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
      position: relative;
      z-index: 3;
    }

    .section-button-full {
      width: 100%;
      position: relative;
      z-index: 3;
      align-self: end;
    }

    [data-open-booking],
    [data-page],
    [data-jump-page],
    [data-faq],
    [data-close-faq] {
      pointer-events: auto;
      touch-action: manipulation;
      cursor: pointer;
    }

    .hero-section {
      min-height: calc(100vh - var(--header-h) - 20px);
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      min-height: 742px;
      display: grid;
      grid-template-columns: minmax(0, 1.04fr) minmax(0, .96fr);
      align-items: stretch;
      gap: 18px;
      padding: 30px;
      min-width: 0;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      max-width: 710px;
      min-width: 0;
    }

    .hero-title {
      max-width: 11.4ch;
      color: var(--text-strong);
      font-size: clamp(52px, 8.2vw, 106px);
      line-height: .91;
      letter-spacing: -.082em;
      text-wrap: balance;
      overflow-wrap: anywhere;
    }

    .hero-title span {
      display: inline-block;
      color: #c4b5fd;
      text-shadow: 0 18px 54px rgba(139,92,246,.24);
    }

    .hero-sub {
      max-width: 650px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.76;
      letter-spacing: -0.015em;
    }

    .hero-trust-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
      min-width: 0;
    }

    .trust-pill {
      min-height: 38px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.045);
      box-shadow: var(--glass-highlight);
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .trust-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent-3);
      box-shadow: 0 0 14px rgba(56,189,248,.36);
      flex: 0 0 auto;
    }

    .hero-side {
      display: grid;
      gap: 16px;
      align-content: stretch;
      min-width: 0;
    }

    .hero-dashboard-panel {
      min-height: 448px;
      display: grid;
      place-items: center;
      padding: 34px;
      background:
        radial-gradient(circle at 50% 0%, rgba(56,189,248,.12), transparent 32%),
        radial-gradient(circle at 70% 70%, rgba(139,92,246,.17), transparent 40%),
        linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.022));
      animation: floatSoft 7.4s ease-in-out infinite;
    }

    .hero-dashboard {
      width: min(440px, 92%);
      position: relative;
      z-index: 1;
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .dashboard-top {
      min-height: 72px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.09);
      background: rgba(5,8,22,.42);
      box-shadow: var(--glass-highlight), 0 12px 24px rgba(0,0,0,.20);
      min-width: 0;
    }

    .dashboard-top strong {
      color: #fff;
      font-family: "Sora", sans-serif;
      font-size: 22px;
      line-height: .95;
      letter-spacing: -.06em;
      min-width: 0;
    }

    .dashboard-top span {
      min-height: 28px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--cyan-line);
      background: var(--cyan-soft);
      color: #93c5fd;
      font-size: 10px;
      font-weight: 1000;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      min-width: 0;
    }

    .dashboard-tile {
      min-height: 88px;
      padding: 14px;
      display: grid;
      align-content: space-between;
      gap: 9px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.085);
      background: rgba(255,255,255,.045);
      box-shadow: var(--glass-highlight), 0 12px 24px rgba(0,0,0,.20);
      min-width: 0;
    }

    .dashboard-tile span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .dashboard-tile strong {
      color: #fff;
      font-family: "Sora", sans-serif;
      font-size: 23px;
      line-height: .95;
      letter-spacing: -.065em;
      overflow-wrap: anywhere;
    }

    .dashboard-flow {
      padding: 14px;
      display: grid;
      gap: 10px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.085);
      background: rgba(255,255,255,.04);
      box-shadow: var(--glass-highlight), 0 12px 24px rgba(0,0,0,.18);
      min-width: 0;
    }

    .dashboard-flow-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .dashboard-flow-node {
      min-height: 42px;
      padding: 0 10px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.045);
      color: #dbeafe;
      font-size: 11px;
      font-weight: 1000;
      text-align: center;
      min-width: 0;
    }

    .dashboard-flow-arrow {
      color: #93c5fd;
      font-weight: 1000;
      text-shadow: 0 0 14px rgba(56,189,248,.28);
    }

    .hero-photo-badge {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 2;
      max-width: 320px;
      padding: 14px 16px;
      display: grid;
      gap: 8px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(5,8,22,.68);
      backdrop-filter: var(--glass-light);
      -webkit-backdrop-filter: var(--glass-light);
      box-shadow: var(--shadow-sm), var(--glass-highlight);
      min-width: 0;
    }

    .hero-photo-badge span {
      color: #93c5fd;
      font-size: 10px;
      font-weight: 1000;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    .hero-photo-badge strong {
      color: #fff;
      font-family: "Sora", sans-serif;
      font-size: 28px;
      line-height: .92;
      letter-spacing: -.075em;
      overflow-wrap: anywhere;
    }

    .hero-info-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      min-width: 0;
    }

    .metric-card {
      min-height: 150px;
      padding: 18px;
      display: grid;
      align-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .metric-card span,
    .metric-card strong {
      position: relative;
      z-index: 1;
    }

    .metric-card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.46;
    }

    .metric-card strong {
      color: #fff;
      font-family: "Sora", sans-serif;
      font-size: 35px;
      line-height: .92;
      letter-spacing: -.075em;
    }

        /* =========================
       MOBILE BASE (КРИТИЧНО)
    ========================= */

    @media (max-width: 900px) {
      .desktop-version {
        display: none;
      }

      .mobile-version {
        display: block;
      }

      body {
        padding-top: 0;
      }
    }

    /* =========================
       MOBILE TOP BAR
    ========================= */

    .app-top {
      position: sticky;
      top: 0;
      z-index: 200;
      min-height: var(--mobile-top-h);
      padding: calc(var(--safe-top) + 10px) 14px 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;

      background:
        linear-gradient(180deg, rgba(5,8,22,.94), rgba(5,8,22,.78));
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: #c4b5fd;
      font-weight: 900;
      box-shadow: var(--shadow-xs);
      touch-action: manipulation;
    }

    .logo-pill {
      display: flex;
      justify-content: center;
    }

    /* =========================
       MOBILE NAV (chips)
    ========================= */

    .section-nav {
      position: sticky;
      top: calc(var(--mobile-top-h) + var(--safe-top));
      z-index: 190;

      display: flex;
      gap: 8px;
      padding: 10px 12px;
      overflow-x: auto;

      background:
        linear-gradient(180deg, rgba(5,8,22,.92), rgba(5,8,22,.75));
      backdrop-filter: blur(18px);
    }

    .nav-chip {
      flex: 0 0 auto;
      height: 36px;
      padding: 0 14px;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);

      background: rgba(255,255,255,.04);
      color: #cbd5ff;

      font-size: 12px;
      font-weight: 900;
      letter-spacing: .04em;

      touch-action: manipulation;
    }

    .nav-chip.active {
      color: #fff;
      background:
        linear-gradient(180deg, #8b5cf6, #6366f1);
      box-shadow: 0 10px 24px rgba(99,102,241,.3);
    }

    /* =========================
       MOBILE PAGES
    ========================= */

    .pages {
      position: relative;
      z-index: 2;
    }

    .page {
      display: none;
      padding: 18px 14px 80px;
    }

    .page.active {
      display: block;
    }

    .page-head {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .page-title {
      font-size: 34px;
      line-height: .95;
      letter-spacing: -.06em;
    }

    .page-title .gold {
      color: #c4b5fd;
    }

    .page-sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    /* =========================
       HERO MOBILE (FIX КНОПОК)
    ========================= */

    .mobile-hero-card {
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.045);
      display: grid;
      gap: 12px;
    }

    .mobile-dashboard-card {
      display: grid;
      gap: 10px;
    }

    .mobile-dashboard-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mobile-mini-tile {
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);

      display: grid;
      gap: 4px;
    }

    .mobile-mini-tile span {
      font-size: 11px;
      color: var(--muted);
      font-weight: 900;
    }

    .mobile-mini-tile strong {
      font-size: 14px;
      color: #fff;
    }

    /* ВАЖНО: фикс кнопок */
    .dual-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;

      position: relative;
      z-index: 5; /* чтобы не перекрывались */
    }

    .cta-btn {
      height: 48px;
      border-radius: 999px;
      border: 0;
      color: #fff;

      background:
        linear-gradient(180deg, #8b5cf6, #6366f1);

      font-weight: 900;
      font-size: 12px;
      letter-spacing: .05em;

      box-shadow: 0 12px 28px rgba(99,102,241,.3);

      touch-action: manipulation;
    }

    .ghost-btn {
      height: 48px;
      border-radius: 999px;

      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);

      color: #cbd5ff;

      font-weight: 900;
      font-size: 12px;

      touch-action: manipulation;
    }

    /* =========================
       MOBILE CARDS (ОСНОВА)
    ========================= */

    .system-card,
    .offer-card,
    .proof-card {
      position: relative;
      z-index: 1;

      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.045);

      display: grid;
      gap: 10px;
    }

    /* КРИТИЧНО: кнопки всегда кликабельны */
    .mobile-card-btn {
      width: 100%;
      min-height: 50px;

      border-radius: 999px;
      border: 1px solid rgba(139,92,246,.34);

      background:
        linear-gradient(180deg, #8b5cf6, #6366f1);

      color: #fff;
      font-weight: 900;
      font-size: 12px;

      z-index: 5;
      position: relative;

      touch-action: manipulation;
    }

    /* =========================
       УБИРАЕМ ЛОМАНЫЕ ТЕКСТЫ (твои красные зоны)
    ========================= */

    .fake-desc,
    .placeholder-text,
    .debug-text {
      display: none !important;
    }

    /* =========================
       SAFE FIX OVERLAPS
    ========================= */

    .screen-body {
      position: relative;
      z-index: 2;
    }

    .page * {
      pointer-events: auto;
    }

    /* =========================
       SCROLL FIX
    ========================= */

    .section-nav::-webkit-scrollbar {
      display: none;
    }

    .section-nav {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

        /* =========================
       DESKTOP EXPERIENCE / SYSTEM
    ========================= */

    .experience-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(0, .88fr);
      gap: 16px;
      align-items: stretch;
    }

    .showcase-phone-wrap {
      min-height: 560px;
      padding: 22px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(56,189,248,.13), transparent 34%),
        radial-gradient(circle at 50% 100%, rgba(139,92,246,.16), transparent 36%),
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.024));
    }

    .showcase-phone {
      width: min(372px, 92%);
      padding: 12px;
      border-radius: 42px;
      border: 1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.035));
      box-shadow:
        0 34px 80px rgba(0,0,0,.38),
        0 0 34px rgba(99,102,241,.14),
        var(--glass-highlight);
      transform: rotate(-2.4deg);
      position: relative;
    }

    .showcase-phone::before {
      content: "";
      position: absolute;
      top: 17px;
      left: 50%;
      width: 92px;
      height: 20px;
      border-radius: 999px;
      transform: translateX(-50%);
      background: rgba(255,255,255,.08);
      z-index: 2;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
    }

    .showcase-screen {
      min-height: 520px;
      padding: 46px 18px 18px;
      display: grid;
      align-content: start;
      gap: 12px;
      overflow: hidden;
      border-radius: 34px;
      border: 1px solid rgba(255,255,255,.09);
      background:
        radial-gradient(circle at 20% 0%, rgba(99,102,241,.18), transparent 28%),
        radial-gradient(circle at 90% 20%, rgba(56,189,248,.10), transparent 30%),
        linear-gradient(180deg, #0b1028, #060a1a);
      box-shadow: var(--glass-highlight), 0 22px 50px rgba(0,0,0,.28);
    }

    .mini-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .mini-logo {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.09);
      background:
        radial-gradient(circle at top, rgba(139,92,246,.16), transparent 44%),
        rgba(255,255,255,.055);
      box-shadow: var(--shadow-xs), var(--glass-highlight);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .mini-pill {
      min-height: 32px;
      padding: 0 11px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      color: #93c5fd;
      background: var(--cyan-soft);
      border: 1px solid var(--cyan-line);
      font-size: 11px;
      font-weight: 1000;
      letter-spacing: .08em;
      white-space: nowrap;
    }

    .mini-title {
      margin: 3px 0 8px;
      font-family: "Sora", sans-serif;
      color: #fff;
      font-size: 32px;
      line-height: .96;
      letter-spacing: -.075em;
    }

    .mini-card {
      min-height: 70px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.045);
      box-shadow: var(--shadow-xs), var(--glass-highlight);
    }

    .mini-card strong {
      color: #fff;
      font-size: 14px;
      line-height: 1.22;
    }

    .mini-card span {
      color: #93c5fd;
      font-size: 12px;
      font-weight: 1000;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .mini-cta {
      min-height: 58px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      margin-top: 4px;
      color: #fff;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.18), transparent 42%),
        linear-gradient(180deg, #8b5cf6, #6366f1 55%, #4f46e5);
      box-shadow: var(--shadow-violet);
      font-size: 13px;
      font-weight: 1000;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .experience-stack {
      display: grid;
      gap: 14px;
    }

    .feature-card {
      min-height: 172px;
      padding: 22px;
      display: grid;
      align-content: space-between;
      gap: 14px;
      transition:
        transform 190ms ease,
        border-color 190ms ease,
        box-shadow 190ms ease;
    }

    .feature-card:hover,
    .pricing-card:hover,
    .product-card:hover,
    .proof-card-desktop:hover,
    .faq-item:hover,
    .social-icon:hover {
      transform: translateY(-4px);
      border-color: var(--accent-line-strong);
      box-shadow:
        var(--shadow-md),
        0 0 0 5px rgba(99,102,241,.06),
        var(--glass-highlight);
    }

    .feature-number {
      position: relative;
      z-index: 1;
      width: 48px;
      height: 48px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      color: #fff;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.22), transparent 42%),
        linear-gradient(180deg, #38bdf8, #6366f1);
      box-shadow: 0 16px 34px rgba(99,102,241,.24);
      font-weight: 1000;
    }

    .feature-card strong {
      position: relative;
      z-index: 1;
      display: block;
      margin-bottom: 8px;
      color: #fff;
      font-family: "Sora", sans-serif;
      font-size: 24px;
      line-height: .98;
      letter-spacing: -.058em;
    }

    .feature-card p {
      position: relative;
      z-index: 1;
      color: var(--muted);
      line-height: 1.64;
      font-size: 15px;
    }

    /* =========================
       DESKTOP MANIFEST / O SYSTEMIE
    ========================= */

    .manifest-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, .76fr) minmax(0, 1.24fr);
      gap: 18px;
      align-items: stretch;
    }

    .manifest-logo-panel {
      min-height: 560px;
      display: grid;
      place-items: end center;
      padding: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 14%, rgba(139,92,246,.20), transparent 30%),
        radial-gradient(circle at 50% 66%, rgba(56,189,248,.12), transparent 38%),
        linear-gradient(180deg, rgba(255,255,255,.060), rgba(255,255,255,.026));
    }

    .manifest-visual {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.020)),
        radial-gradient(circle at 42% 20%, rgba(99,102,241,.18), transparent 30%),
        radial-gradient(circle at 74% 72%, rgba(56,189,248,.10), transparent 34%);
      transform: scale(1.02);
    }

    .manifest-visual::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(5,8,22,.04), rgba(5,8,22,.38)),
        radial-gradient(circle at 50% 20%, transparent 20%, rgba(5,8,22,.18) 100%);
    }

    .manifest-logo-mark {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 100%;
      padding: 18px;
      display: grid;
      justify-items: center;
      gap: 10px;
      text-align: center;
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(5,8,22,.62);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      box-shadow: var(--shadow-sm), var(--glass-highlight);
      overflow: hidden;
    }

    .manifest-logo-mark span:first-child {
      display: block;
      width: 100%;
      max-width: 100%;
      font-family: "Sora", sans-serif;
      font-size: clamp(32px, 4.2vw, 64px);
      line-height: .86;
      letter-spacing: -.08em;
      color: #fff;
      text-shadow: 0 20px 54px rgba(139,92,246,.20);
      white-space: nowrap;
      overflow: hidden;
    }

    .manifest-logo-mark span:last-child {
      color: #93c5fd;
      font-family: "Sora", sans-serif;
      font-size: 12px;
      font-weight: 1000;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .manifest-copy {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .manifest-line {
      padding: 22px;
    }

    .manifest-line p {
      position: relative;
      z-index: 1;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.82;
    }

    .manifest-line strong {
      color: #c4b5fd;
    }

    .manifest-mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .manifest-mini {
      min-height: 142px;
      padding: 16px;
      display: grid;
      align-content: space-between;
      gap: 12px;
    }

    .manifest-mini span {

    /* =========================
       DESKTOP EFFECT / GALLERY MAP
    ========================= */

    .effect-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.2fr .8fr 1fr;
      grid-auto-rows: 220px;
      gap: 16px;
    }

    .effect-tile {
      position: relative;
      overflow: hidden;
      display: grid;
      align-content: end;
      padding: 18px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,.075);
      background:
        radial-gradient(circle at 30% 18%, rgba(56,189,248,.14), transparent 28%),
        radial-gradient(circle at 80% 80%, rgba(139,92,246,.18), transparent 38%),
        linear-gradient(135deg, rgba(255,255,255,.055), rgba(255,255,255,.024));
      box-shadow: var(--shadow-sm), var(--glass-highlight);
      transition:
        transform 190ms ease,
        border-color 190ms ease,
        box-shadow 190ms ease;
    }

    .effect-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(99,102,241,.10)),
        linear-gradient(0deg, rgba(0,0,0,.34), transparent 48%);
      z-index: 0;
    }

    .effect-tile strong {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.20);
      font-family: "Sora", sans-serif;
      font-size: clamp(56px, 7vw, 110px);
      line-height: .85;
      letter-spacing: -.09em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .effect-tile span {
      position: relative;
      z-index: 2;
      width: fit-content;
      min-height: 36px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(5,8,22,.62);
      color: #93c5fd;
      box-shadow: var(--shadow-xs), var(--glass-highlight);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 12px;
      font-weight: 1000;
      letter-spacing: .02em;
    }

    .effect-tile.large {
      grid-row: span 2;
    }

    .effect-tile.wide {
      grid-column: span 2;
    }

    .effect-tile:hover {
      transform: translateY(-4px);
      border-color: var(--accent-line-strong);
      box-shadow:
        var(--shadow-md),
        0 0 0 5px rgba(99,102,241,.06),
        var(--glass-highlight);
    }

    function triggerFlash() {
      if (!flash) return;

      flash.classList.add("active");
      setTimeout(() => flash.classList.remove("active"), 140);
    }

    function setLanguage(lang) {
      const dictionary = translations[lang] || translations.pl;
      currentLang = lang;
      localStorage.setItem("mrozowskiLang", lang);
      document.documentElement.lang = lang;

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.dataset.i18n;
        if (!key) return;

        const value = dictionary[key];
        if (typeof value === "string") {
          element.textContent = value;
        }
      });

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });
    }

    function bindLanguageSwitcher() {
      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => {
          setLanguage(button.dataset.lang);
          triggerFlash();
        });
      });

      setLanguage(currentLang);
    }

    function openBooking() {
      if (!overlay) return;

      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
      document.body.classList.add("booking-open");
      triggerFlash();
    }

    function closeBooking() {
      if (!overlay) return;

      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
      document.body.classList.remove("booking-open");
    }

    window.callBarbershop = callMrozowski;
    window.callDogma = callMrozowski;

    window.closeBooking = closeBooking;

      faqSheetAnswer.textContent = data[1];

      faqSheet.classList.add("open");
      faqSheet.setAttribute("aria-hidden", "false");
      document.body.classList.add("faq-open");
      triggerFlash();

      overlay?.addEventListener("click", (event) => {

      });

    function bindMobileNavigation() {
      const chips = document.querySelectorAll(".nav-chip");
      const pages = document.querySelectorAll(".page");

      function activatePage(pageName) {
        if (!pageName) return;

        chips.forEach((item) => {
          item.classList.toggle("active", item.dataset.page === pageName);
        });

        pages.forEach((item) => {
          item.classList.toggle("active", item.dataset.pageView === pageName);
        });

        mobileVersion?.classList.remove("mobile-header-hidden");

        const activeChip = document.querySelector(`.nav-chip[data-page="${pageName}"]`);
        activeChip?.scrollIntoView({
          behavior: "smooth",
          inline: "center",
          block: "nearest"
        });

        const activePage = document.querySelector(`.page[data-page-view="${pageName}"]`);
        const scrollables = activePage?.querySelectorAll(
          ".reviews-mobile-list, .faq-mobile-list"
        );

        scrollables?.forEach((item) => {
          item.scrollTo({ top: 0, left: 0, behavior: "smooth" });
        });

        if (window.innerWidth <= 900) triggerFlash();
      }

      chips.forEach((chip) => {
        chip.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          activatePage(chip.dataset.page);
        });
      });

      document.querySelectorAll("[data-jump-page]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          activatePage(button.dataset.jumpPage);
        });
      });

      window.activateMobilePage = activatePage;
    }

    function bindMobileSmartHeader() {
      document.addEventListener("touchstart", (event) => {
        const touch = event.touches[0];
        if (!touch) return;

        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: true });

      const verticalScrollers = document.querySelectorAll(".reviews-mobile-list, .faq-mobile-list");

      verticalScrollers.forEach((scroller) => {
        scroller.addEventListener("scroll", () => {
          if (!mobileVersion || window.innerWidth > 900) return;

          const current = scroller.scrollTop;
          const delta = current - lastMobileScrollTop;

          if (delta > 8 && current > 40) {
            mobileVersion.classList.add("mobile-header-hidden");
          }

          if (delta < -4 || current < 20) {
            mobileVersion.classList.remove("mobile-header-hidden");
          }

          lastMobileScrollTop = Math.max(current, 0);
        }, { passive: true });
      });

      document.addEventListener("touchmove", (event) => {
        if (!mobileVersion || window.innerWidth > 900) return;

        const touch = event.touches[0];
        if (!touch) return;

        const dx = Math.abs(touch.clientX - touchStartX);
        const dy = Math.abs(touch.clientY - touchStartY);

        if (dx > dy) return;

        if (touch.clientY < touchStartY - 18) {
          mobileVersion.classList.add("mobile-header-hidden");
        }

        if (touch.clientY > touchStartY + 12) {
          mobileVersion.classList.remove("mobile-header-hidden");
        }
      }, { passive: true });
    }

    function handleDesktopScroll() {
      if (window.innerWidth <= 900) {
        ticking = false;
        return;
      }

      const currentY = window.scrollY;

      if (siteHeader) {
        const delta = currentY - lastScrollY;
        const goingDown = delta > 4;
        const goingUp = delta < -2;

        if (goingDown && currentY > 120) {
          siteHeader.classList.add("header-hidden");
        }

        if (goingUp || currentY < 70) {
          siteHeader.classList.remove("header-hidden");
        }
      }

      lastScrollY = Math.max(currentY, 0);
      ticking = false;
    }

    window.addEventListener("scroll", () => {
      if (!ticking) {
        window.requestAnimationFrame(handleDesktopScroll);
        ticking = true;
      }
    }, { passive: true });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeBooking();
        closeFaq();
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      bindLanguageSwitcher();
      bindBookingButtons();
      bindMobileNavigation();
      bindMobileSmartHeader();
      bindFaq();
    });
